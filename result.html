
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Brixtonn CBT Result</title>
        <link rel="stylesheet" href="assets/style.css">
    </head>
    <body>
        <div class="result-card">
            <h1>BRIXTONN SCHOOLS CBT RESULT</h1>
            <p id="student"></p>
            <p id="subject"></p>
            <div class="result-score" id="score"></div>
            <div class="grade" id="grade"></div>
            <p id="percent"></p>
            <div class="actions">
                <button onclick="window.print()">Print Result</button>
                <button onclick="window.location.href='index.html'">Back Home</button>
            </div>
        </div>
        <script>
        const p=new URLSearchParams(location.search);
        const percentage=parseFloat(p.get('percentage')||0);
        let grade='F';
        if(percentage>=70) grade='A';
        else if(percentage>=60) grade='B';
        else if(percentage>=50) grade='C';
        else if(percentage>=45) grade='D';
        else if(percentage>=40) grade='E';
        
        document.getElementById('student').innerHTML='<b>Student:</b> '+(p.get('student')||'');
        document.getElementById('subject').innerHTML='<b>Subject:</b> '+(p.get('subject')||'');
        document.getElementById('score').textContent=(p.get('score')||0)+' / '+(p.get('total')||0);
        document.getElementById('grade').textContent='Grade: '+grade;
        document.getElementById('percent').textContent='Percentage: '+percentage+'%';
        </script>
        <footer>
            <img src="assets/brixtonn_logo.png" height="40">  
            <span><b><img src="assets/brixtonn_logo.png" height="40"></b></span>  
            <span><b><img src="assets/brixtonn_logo.png" height="40"></b></span>
            <p>© 2026 Brixtonn Schools CBT System. All Rights Reserved.</p>
        </footer>
    </body>
</html>
